[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  command = "export NEXT_PUBLIC_GIT_SHA=\"${COMMIT_REF:-unknown}\" && npm run db:generate && npm run db:prune-artifacts && npm run build"
  # Note: publish directory is automatically handled by the Next.js adapter
  # db:generate runs prisma generate which creates the Prisma Client from schema.prisma

[build.environment]
  NODE_VERSION = "20"
  TZ = "America/Toronto"

# Note: Next.js API routes work automatically with the adapter
# No need for manual redirects - the adapter handles all routing




