# Production smoke tests — run after deploy or on demand.
# Set repository secret PRODUCTION_SITE_URL (optional); defaults to dojofinancier.com.

name: Production smoke tests

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check critical URLs
        env:
          SITE_URL: ${{ secrets.PRODUCTION_SITE_URL }}
        run: |
          set -euo pipefail
          BASE="${SITE_URL:-https://dojofinancier.com}"
          BASE="${BASE%/}"
          echo "Testing $BASE"
          for path in \
            "/" \
            "/login" \
            "/formations" \
            "/api/health" \
            "/logo_dark.png" \
            "/logo_light.png"; do
            code="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 "$BASE$path")"
            echo "$path -> $code"
            test "$code" = "200" || exit 1
          done
          echo "All checks passed."
